/* ====== 成长日程：周视图/月视图完整实现 ====== */
var _calWeekStart = (function() { var d = new Date(); var day = d.getDay(); d.setDate(d.getDate() - day); d.setHours(0,0,0,0); return d; })();
var _calView = 'week';
var _calYear = new Date().getFullYear();
var _calMonth = new Date().getMonth();

function _calGetWeekDates(ws) {
    var dates = [];
    for (var i = 0; i < 7; i++) { var d = new Date(ws); d.setDate(d.getDate() + i); dates.push(d); }
    return dates;
}
function _calDayEvents(dateStr) {
    var all = JSON.parse(localStorage.getItem('事件表') || '[]');
    return all.filter(function(e) { return e.date === dateStr && (e.type === 'plan' || e.type === 'log' || e.type === 'reminder') && e.time; });
}

function _calRenderWeek() {
    var weekDates = _calGetWeekDates(_calWeekStart);
    var todayStr = formatDate(new Date());
    var titleEl = document.getElementById('currentWeek');
    if (titleEl) {
        var s = weekDates[0], e = weekDates[6];
        titleEl.textContent = s.getFullYear()+'年'+(s.getMonth()+1)+'月'+s.getDate()+'日 - '+(e.getMonth()+1)+'月'+e.getDate()+'日';
    }
    var headerRow = document.getElementById('weekHeader');
    if (headerRow) {
        var hh = '<th class="time-label">时间</th>';
        var dayNames = '日一二三四五六';
        weekDates.forEach(function(d) {
            var ds = formatDate(d);
            var cls = (ds === todayStr ? 'today-header' : '') + (ds === window.currentDate ? ' selected-day' : '');
            hh += '<th class="'+cls+'" onclick="window._calSelectDay(\''+ds+'\')" style="cursor:pointer;">'
                + (d.getMonth()+1)+'/'+d.getDate()+'<div class="day-name">周'+dayNames[d.getDay()]+'</div></th>';
        });
        headerRow.innerHTML = hh;
    }
    // 半点粒度：6:00 ~ 22:30，每格30分钟
    var slots = [];
    for (var h = 6; h <= 22; h++) {
        slots.push({ hour: h, min: 0 });
        if (h < 23) slots.push({ hour: h, min: 30 });
    }
    var body = document.getElementById('weekBody');
    if (!body) return;

    // 预计算每天每格跨度（rowspan合并）
    // 规则：事件有 time 和 endTime 时，计算占几个半点格，用 rowspan 合并
    function _slotKey(h, m) { return h * 100 + m; }
    function _timeToSlot(timeStr) {
        if (!timeStr) return null;
        var parts = timeStr.split(':');
        var h = parseInt(parts[0]), m = parseInt(parts[1]||0);
        // 对齐到最近的30分钟起点
        return { hour: h, min: m < 30 ? 0 : 30 };
    }
    function _slotSpan(startTime, endTime) {
        // 返回该事件跨几个半点格
        if (!endTime) return 1;
        var sp = startTime.split(':'), ep = endTime.split(':');
        var sm = parseInt(sp[0])*60 + parseInt(sp[1]||0);
        var em = parseInt(ep[0])*60 + parseInt(ep[1]||0);
        var diff = em - sm;
        if (diff <= 0) return 1;
        return Math.max(1, Math.round(diff / 30));
    }

    // 构建每天的格子占用表：skipMap[dayIndex][slotKey] = true 表示被合并跳过
    var skipMap = [];
    var spanMap = []; // spanMap[dayIndex][slotKey] = {ev, span}
    weekDates.forEach(function(_, di) { skipMap.push({}); spanMap.push({}); });

    weekDates.forEach(function(d, di) {
        var ds = formatDate(d);
        var evts = _calDayEvents(ds);
        evts.forEach(function(ev) {
            if (!ev.time) return;
            var st = _timeToSlot(ev.time);
            if (!st) return;
            var span = _slotSpan(ev.time, ev.endTime);
            var sk = _slotKey(st.hour, st.min);
            if (!spanMap[di][sk]) spanMap[di][sk] = [];
            spanMap[di][sk].push({ ev: ev, span: span });
            // 标记后续格子跳过（单事件跨格）
            // 仅对第一个事件做跨格，多事件叠加不跨格
            if (span > 1 && spanMap[di][sk].length === 1) {
                for (var s = 1; s < span; s++) {
                    var idx = slots.findIndex(function(sl) { return sl.hour === st.hour && sl.min === st.min; }) + s;
                    if (idx < slots.length) {
                        var nsk = _slotKey(slots[idx].hour, slots[idx].min);
                        if (!skipMap[di][nsk]) skipMap[di][nsk] = sk; // 记录被哪个格子占用
                    }
                }
            }
        });
    });

    var bh = '';
    slots.forEach(function(slot) {
        var isFullHour = slot.min === 0;
        var tl = (slot.hour < 10 ? '0' : '') + slot.hour + (isFullHour ? ':00' : ':30');
        var tlClass = 'time-label ' + (isFullHour ? 'full-hour' : 'half-hour');
        bh += '<tr><td class="'+tlClass+'">'+tl+'</td>';
        weekDates.forEach(function(d, di) {
            var ds = formatDate(d);
            var sk = _slotKey(slot.hour, slot.min);
            // 被其他格跨列合并，跳过
            if (skipMap[di][sk]) return;
            var cellClass = 'hour-cell ' + (isFullHour ? 'full-hour-start' : 'half-hour-start');
            var evtsInSlot = spanMap[di][sk] || [];
            // 计算rowspan：若只有1个事件且有span>1，使用rowspan
            var rowspan = 1;
            if (evtsInSlot.length === 1 && evtsInSlot[0].span > 1) {
                rowspan = evtsInSlot[0].span;
            }
            var cellH = rowspan * 30;
            var rsAttr = rowspan > 1 ? ' rowspan="'+rowspan+'"' : '';
            var styleAttr = rowspan > 1 ? ' style="height:'+cellH+'px;vertical-align:top;"' : '';
            var _tp = (slot.hour<10?'0':'')+slot.hour+':'+(slot.min===0?'00':'30');
            bh += '<td class="'+cellClass+'"'+rsAttr+styleAttr+' onclick="window._calCellClick(\''+ds+'\',\''+_tp+'\')">';
            evtsInSlot.forEach(function(item) {
                var ev = item.ev;
                var di2 = (window.DOMAIN_ICONS && window.DOMAIN_ICONS[ev.domain]) || '';
                var timeLabel = fmtTimeRange(ev.time, ev.endTime);
                var blockH = item.span > 1 ? ' style="min-height:'+(item.span*30-6)+'px;"' : '';
                // 按事件类型着色：日志=绿，提醒=黄，计划=状态色
                var colorClass;
                if (ev.type === 'log') {
                    colorClass = 'type-log';
                } else if (ev.type === 'reminder') {
                    colorClass = 'type-reminder';
                } else if (ev.type === 'plan' && ev.status) {
                    colorClass = 'type-plan-status-' + ev.status;
                } else {
                    colorClass = 'domain-' + (ev.domain || 'other');
                }
                bh += '<div class="event-block '+colorClass+'"'+blockH+' onclick="event.stopPropagation();window.editEvent(\''+ev.id+'\')">'
                    + '<span class="event-icon">'+di2+'</span><span class="event-time-label">'+timeLabel+'</span><span class="event-title">'+window.escapeHtml(ev.content)+'</span></div>';
            });
            bh += '</td>';
        });
        bh += '</tr>';
    });
    body.innerHTML = bh;
}

function _calRenderMonth() {
    var grid = document.getElementById('daysGrid');
    if (!grid) return;
    var firstDay = new Date(_calYear, _calMonth, 1).getDay();
    var daysInMonth = new Date(_calYear, _calMonth + 1, 0).getDate();
    var todayStr = formatDate(new Date());
    var mh = '';
    for (var i = 0; i < firstDay; i++) mh += '<div class="day-cell empty"></div>';
    for (var day = 1; day <= daysInMonth; day++) {
        var ds = _calYear+'-'+(_calMonth+1<10?'0':'')+(_calMonth+1)+'-'+(day<10?'0':'')+day;
        var isToday = ds === todayStr;
        var dayEvts = _calDayEvents(ds);
        mh += '<div class="day-cell'+(isToday?' today':'')+'" onclick="window._calDayClick(\''+ds+'\')">';
        mh += '<div class="day-number">'+day+'</div>';
        dayEvts.slice(0, 3).forEach(function(ev) {
            var di = (window.DOMAIN_ICONS && window.DOMAIN_ICONS[ev.domain]) || '';
            var sc = ev.status ? ' card-'+ev.status : '';
            var timeStr = ev.time ? fmtTimeRange(ev.time, ev.endTime) + ' ' : '';
            mh += '<div class="day-card'+sc+'" onclick="event.stopPropagation();window.editEvent(\''+ev.id+'\')">'
                + di + timeStr + window.escapeHtml((ev.content||'').substring(0,6))+'</div>';
        });
        if (dayEvts.length > 3) mh += '<div style="font-size:10px;color:#718096;">+'+(dayEvts.length-3)+'</div>';
        mh += '</div>';
    }
    grid.innerHTML = mh;
    var monthLabel = document.getElementById('currentMonth');
    if (monthLabel) monthLabel.textContent = _calYear+'年'+(_calMonth+1)+'月';
}

});

// 手动检查更新
window.manualCheckUpdate = function() {
    var resultDiv = document.getElementById('updateResult');
    if (resultDiv) resultDiv.innerHTML = '<span style="color:#718096;">⏳ 正在检查...</span>';
    if (window.location.protocol === 'file:') {
        if (resultDiv) resultDiv.innerHTML = '<span style="color:#E53E3E;">⚠️ 本地文件无法检查更新，请部署到云端后使用</span>';
        return;
    }
    var baseUrl = window.location.href.replace(/\/[^/]*$/, '/');
    var versionUrl = baseUrl + 'version.json?t=' + Date.now();
    fetch(versionUrl, { cache: 'no-cache' })
        .then(function(res) {
            if (!res.ok) throw new Error('无法获取版本信息');
            return res.json();
        })
        .then(function(data) {
            if (data && data.version) {
                var currentVer = typeof APP_VERSION !== 'undefined' ? APP_VERSION : '6.2';
                if (data.version !== currentVer) {
                    var changes = '';
                    if (data.changes && data.changes.length > 0) {
                        changes = '<ul style="margin:8px 0;padding-left:20px;"><li>' + data.changes.slice(0,5).join('</li><li>') + '</li></ul>';
                    }
                    if (resultDiv) resultDiv.innerHTML = '<div style="padding:12px;background:#F0FFF4;border-radius:8px;border-left:4px solid #48BB78;"><p style="color:#22543D;font-weight:600;">✅ 发现新版本 v' + data.version + '</p>' + changes + '<button class="btn btn-primary" style="margin-top:8px;" onclick="window.location.reload(true)">🔄 立即刷新</button></div>';
                    showUpdateNotification(data.version, data.changes);
                } else {
                    if (resultDiv) resultDiv.innerHTML = '<div style="padding:12px;background:#F0FFF4;border-radius:8px;border-left:4px solid #48BB78;"><p style="color:#22543D;">✅ 已是最新版本 v' + data.version + '</p></div>';
                }
                try { localStorage.setItem('最后检查更新时间', Date.now().toString()); } catch(e) {}
                var lastCheckEl = document.getElementById('lastCheckTime');
                if (lastCheckEl) lastCheckEl.textContent = new Date().toLocaleString('zh-CN');
            }
        })
        .catch(function(err) {
            if (resultDiv) resultDiv.innerHTML = '<span style="color:#E53E3E;">❌ 检查失败：' + err.message + '。<br>请确保已部署 version.json 文件。</span>';
        });
};
</script>
