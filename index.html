<script>if(typeof XLSX==='undefined'){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.20.2/dist/xlsx.full.min.js';document.head.appendChild(s);}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','微软雅黑',sans-serif;background:linear-gradient(135deg,#FAF5FF 0%,#F3E8FF 100%);min-height:100vh;color:#553C7B}
.container{max-width:100%;margin:0 auto;padding:20px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .3s}
.btn:hover{transform:translateY(-2px)}
.btn-primary{background:linear-gradient(135deg,#B794F6 0%,#F687B3 100%);color:#fff}
.btn-success{background:linear-gradient(135deg,#68D391 0%,#48BB78 100%);color:#fff}
.btn-warning{background:linear-gradient(135deg,#F6AD55 0%,#ED8936 100%);color:#fff}
.btn-danger{background:linear-gradient(135deg,#FC8181 0%,#E53E3E 100%);color:#fff}
.btn-info{background:#E2E8F0;color:#553C7B}
.btn-sm{padding:6px 12px;font-size:12px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:15px}
.card-title{font-size:16px;font-weight:600;margin-bottom:15px;color:#553C7B}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;padding:30px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto}
.modal h3{margin-bottom:20px;font-size:18px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#553C7B;color:#fff;padding:12px 24px;border-radius:25px;z-index:2000;display:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@media(max-width:1024px){.main-layout{flex-direction:column}.sidebar-section{width:100% !important}.week-section{min-width:0}.timeline-table{font-size:12px;min-width:800px}}
@media(max-width:768px){.tab-btn{padding:10px 12px;font-size:12px}.container{padding:10px}.stats-grid{grid-template-columns:1fr !important}.overview-grid{grid-template-columns:repeat(2,1fr)}.data-stats{grid-template-columns:repeat(2,1fr)}.summary-row{grid-template-columns:repeat(2,1fr)}.btn-group{flex-wrap:wrap}.modal{width:95%;padding:20px}.quick-stats{grid-template-columns:repeat(2,1fr)}.module-grid{grid-template-columns:repeat(2,1fr)}.top-nav{padding:8px 15px}.nav-brand{font-size:16px}.home-overview{grid-template-columns:1fr !important}.week-grid{overflow-x:auto;-webkit-overflow-scrolling:touch}.toolbar{flex-direction:column;align-items:stretch;gap:10px}.toolbar .week-nav{justify-content:center}.toolbar>div:last-child{justify-content:center;flex-wrap:wrap}.timeline-table{min-width:700px;font-size:11px}}
.tab-nav{background:#fff;display:flex;padding:0 20px;box-shadow:0 2px 10px rgba(0,0,0,.05);overflow-x:auto}
.tab-btn{padding:15px 25px;border:none;background:0 0;cursor:pointer;font-size:14px;font-weight:500;color:#718096;border-bottom:3px solid transparent;transition:all .3s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.tab-btn:hover{color:#B794F6;background:#FAF5FF}
.tab-btn.active{color:#B794F6;border-bottom-color:#B794F6}
.tab-icon{font-size:18px}
.tab-content{padding:20px;min-height:calc(100vh - 120px)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.top-nav{background:linear-gradient(135deg,#B794F6 0%,#F687B3 100%);padding:15px 30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(183,148,246,.3)}
.nav-brand{color:#fff;font-size:20px;font-weight:700}
.nav-brand span{font-size:12px;opacity:.8;font-weight:400;margin-left:10px}
.nav-actions{display:flex;gap:10px}
.nav-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;transition:background .3s}
.nav-btn:hover{background:rgba(255,255,255,.3)}
.welcome-card{background:#fff;border-radius:12px;padding:40px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.welcome-icon{margin-bottom:4px}
.welcome-title{font-size:28px;font-weight:700;margin-bottom:10px}
.welcome-subtitle{font-size:16px;color:#718096;margin-bottom:30px}
.module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-top:30px}
.module-item{padding:20px;border-radius:12px;background:linear-gradient(135deg,#FAF5FF 0%,#F3E8FF 100%);text-align:center;cursor:pointer;transition:all .3s}
.module-item:hover{transform:translateY(-5px);box-shadow:0 5px 20px rgba(183,148,246,.3)}
.module-icon{font-size:32px;margin-bottom:10px}
.module-name{font-size:14px;font-weight:600}
.module-desc{font-size:12px;color:#718096;margin-top:5px}
.quick-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-top:30px}
.quick-stat{padding:20px;border-radius:10px;background:#fff;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.quick-stat-value{font-size:28px;font-weight:700;color:#B794F6}
.quick-stat-label{font-size:12px;color:#718096;margin-top:5px}
.sub-tab-nav{display:flex;gap:0;margin-bottom:20px;background:#F3E8FF;border-radius:10px;padding:4px}
.sub-tab-btn{padding:10px 24px;border:none;background:transparent;cursor:pointer;font-size:14px;border-radius:8px;color:#718096;transition:all .3s;font-weight:500}
.sub-tab-btn:hover{color:#553C7B}
.sub-tab-btn.active{background:#fff;color:#B794F6;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.sub-tab-content{display:none}
.sub-tab-content.active{display:block}
.data-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px}
.stat-card{padding:20px;border-radius:10px;background:#FAF5FF;text-align:center}
.stat-card .stat-icon{font-size:28px;margin-bottom:8px}
.stat-card .stat-value{font-size:24px;font-weight:700;color:#B794F6}
.stat-card .stat-label{font-size:12px;color:#718096;margin-top:4px}
.stat-card.storage-warn .stat-value{color:#ED8936}
.stat-card.storage-danger .stat-value{color:#E53E3E}
.home-trend-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.home-trend-bar{width:100%;border-radius:6px 6px 0 0;transition:height .3s;min-height:4px}
.home-trend-pct{font-size:11px;font-weight:600;color:#718096}
.home-trend-day{font-size:11px;color:#A0AEC0}
.home-event-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:6px;font-size:13px;cursor:pointer;transition:background .2s}
.home-event-item:hover{filter:brightness(.95)}
.home-event-time{font-size:12px;color:#718096;min-width:50px}
.home-project-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:6px;font-size:13px;cursor:pointer;transition:background .2s}
.home-project-item:hover{filter:brightness(.95)}
.backup-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.backup-btn{background:#FAF5FF;border:2px solid #F3E8FF;border-radius:12px;padding:20px;cursor:pointer;text-align:center;transition:all .3s}
.backup-btn:hover{border-color:#B794F6;transform:translateY(-3px);box-shadow:0 5px 20px rgba(183,148,246,.2)}
.backup-btn-icon{font-size:36px;margin-bottom:10px}
.backup-btn-title{font-size:16px;font-weight:600;color:#553C7B;margin-bottom:5px}
.backup-btn-desc{font-size:12px;color:#718096}
.api-config{background:#FAF5FF;border-radius:10px;padding:20px;margin-bottom:20px}
.api-config .form-row{display:flex;gap:15px;align-items:flex-end;flex-wrap:wrap}
.api-config .form-group{flex:1;min-width:200px}
.api-config label{display:block;font-size:13px;color:#718096;margin-bottom:5px;font-weight:500}
.api-config input{width:100%;padding:10px 14px;border:1px solid #E2E8F0;border-radius:8px;font-size:14px;font-family:'Consolas','Courier New',monospace}
.api-config input:focus{border-color:#B794F6;outline:none}
.api-status{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;margin-top:10px}
.api-status.ok{background:#C6F6D5;color:#38A169}
.api-status.err{background:#FED7D2;color:#E53E3E}
.api-status.pending{background:#FEEBC8;color:#DD6B20}
.import-mode{margin:15px 0}
.import-mode label{font-size:13px;color:#718096;margin-right:20px;cursor:pointer}
.import-mode input{margin-right:5px}
.history-list{max-height:200px;overflow-y:auto}
.history-item{display:flex;align-items:center;padding:10px;border-bottom:1px solid #F3E8FF;gap:12px}
.history-icon{font-size:20px;width:36px;text-align:center}
.history-info{flex:1}
.history-name{font-size:14px;font-weight:500}
.history-date{font-size:11px;color:#A0AEC0}
.history-size{font-size:12px;color:#718096}
.empty-state{text-align:center;padding:30px;color:#A0AEC0;font-size:14px}
.legend{display:flex;gap:15px;align-items:center;padding:10px 0;font-size:12px;color:#718096;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:50%}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.week-nav{display:flex;align-items:center;gap:15px}
.week-nav h2{font-size:18px;min-width:200px;text-align:center}
.view-toggle{display:flex;gap:5px;background:#E2E8F0;padding:4px;border-radius:8px}
.view-toggle .btn{padding:6px 12px;background:transparent;color:#718096}
.view-toggle .btn.active{background:white;color:#553C7B;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.main-layout{display:flex;gap:20px}
.week-section{flex:1;min-width:0}
.week-grid{display:none;background:white;border-radius:12px;padding:15px;box-shadow:0 2px 10px rgba(0,0,0,.05);overflow-x:auto}
.timeline-table{width:100%;border-collapse:collapse;table-layout:fixed}
.timeline-table th,.timeline-table td{border:1px solid #E2E8F0;vertical-align:top;padding:0}
.timeline-table th{background:#FAF5FF;font-weight:600;font-size:13px;text-align:center;padding:10px 5px}
.timeline-table th .day-name{font-size:12px;color:#718096;font-weight:normal}
.timeline-table th.today-header{background:linear-gradient(135deg,#B794F6 0%,#F687B3 100%);color:white}
.timeline-table th.today-header .day-name{color:rgba(255,255,255,.8)}
.timeline-table th.selected-day{background:#E9D8FD !important;color:#553C7B}
.timeline-table th.selected-day .day-name{color:#553C7B}
.time-label{width:60px;font-size:12px;color:#718096;text-align:center;background:#FAFAFA;font-weight:500}
.hour-cell{height:30px;position:relative;cursor:pointer;background:white;transition:background .2s}
.hour-cell:hover{background:#FAF5FF}
.hour-cell.half-hour-start{border-top:1px solid #E2E8F0}
.hour-cell.full-hour-start{border-top:2px solid #CBD5E0}
.time-label.full-hour{font-weight:600;color:#553C7B}
.time-label.half-hour{font-size:10px;color:#A0AEC0}
.event-block{position:absolute;left:2px;right:2px;padding:3px 5px;border-radius:4px;font-size:11px;overflow:hidden;cursor:pointer;z-index:1}
.event-block .event-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.event-block .event-time-label{font-size:10px;color:#718096;margin-right:3px;white-space:nowrap}
.event-block .event-icon{margin-right:3px}
.domain-work{background:#FEEBC8;border-left:3px solid #ED8936}
.domain-study{background:#BEE3F8;border-left:3px solid #4299E1}
.domain-health{background:#C6F6D5;border-left:3px solid #48BB78}
.domain-family{background:#FED7E2;border-left:3px solid #ED64A6}
.domain-social{background:#E9D8FD;border-left:3px solid #9F7AEA}
.domain-hobby{background:#FED7AA;border-left:3px solid #F6AD55}
.domain-mind{background:#B2F5EA;border-left:3px solid #38B2AC}
/* 周视图：按事件类型着色 */
.type-log{background:#C6F6D5;border-left:3px solid #38A169;color:#276749}
.type-reminder{background:#FEFCBF;border-left:3px solid #D69E2E;color:#975A16}
.type-plan-status-todo{background:#FFF5F5;border-left:3px solid #E53E3E;color:#C53030}
.type-plan-status-doing{background:#FFFFF0;border-left:3px solid #D69E2E;color:#975A16}
.type-plan-status-done{background:#F0FFF4;border-left:3px solid #38A169;color:#276749}
.type-plan-status-recorded{background:#EBF8FF;border-left:3px solid #3182CE;color:#2A4365}
.type-plan-status-pending{background:#FFFAF0;border-left:3px solid #DD6B20;color:#9C4221}
.type-plan-status-adopted{background:#F0FFF4;border-left:3px solid #48BB78;color:#276749}
.type-plan-status-abandoned{background:#EDF2F7;border-left:3px solid #A0AEC0;color:#718096}
.today-sidebar{width:300px;flex-shrink:0}
.today-card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.05);position:sticky;top:20px}
.today-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.today-date{font-size:16px;font-weight:600;color:#553C7B}
.today-title{font-size:18px;font-weight:600;color:#553C7B;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #FAF5FF}
.today-section{margin-bottom:15px}
.today-section-title{font-size:13px;font-weight:600;color:#718096;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.highlight-list{list-style:none}
.highlight-list li{padding:5px 10px;background:#F0FFF4;color:#38A169;border-radius:4px;margin-bottom:5px;font-size:13px}
.regret-item{padding:5px 10px;background:#FFF5F5;color:#FC8181;border-radius:4px;font-size:13px}
.health-item{padding:5px 10px;background:#F0FFF4;color:#38A169;border-radius:4px;margin-bottom:5px;font-size:13px}
.quality-mini{display:flex;flex-wrap:wrap;gap:5px}
.quality-mini span{padding:3px 8px;border-radius:4px;font-size:11px}
.quality-mini .on{background:#68D391;color:white}
.quality-mini .off{background:#E2E8F0;color:#A0AEC0}
.no-data{text-align:center;color:#A0AEC0;font-size:13px;padding:10px}
.edit-btn{width:100%;margin-top:10px}
.calendar-grid{display:none}
.calendar-grid.active{display:block}
.week-grid.active{display:block}
.close-btn{background:none;border:none;font-size:24px;cursor:pointer;color:#718096}
.event-list{margin-bottom:20px}
.event-item{display:flex;align-items:center;padding:10px;border-radius:8px;margin-bottom:8px;background:#FAFAFA;gap:10px}
.event-item .evt-time{font-size:12px;color:#718096;white-space:nowrap;min-width:80px}
.event-item .evt-type{font-size:12px;color:#9F7AEA;background:#F3E8FF;padding:1px 6px;border-radius:4px}
.event-domain{font-size:16px}
.event-content{flex:1}
.event-status{padding:3px 10px;border-radius:12px;font-size:12px}
.status-todo{background:#FFF5F5;color:#FC8181}
.status-doing{background:#FFFFF0;color:#D69E2E}
.status-done{background:#F0FFF4;color:#38A169;text-decoration:line-through}
.status-recorded{background:#EBF8FF;color:#3182CE}
.status-pending{background:#FFFAF0;color:#DD6B20}
.status-adopted{background:#F0FFF4;color:#38A169}
.status-abandoned{background:#EDF2F7;color:#A0AEC0;text-decoration:line-through}
.summary-form{background:#FAF5FF;padding:15px;border-radius:10px}
.summary-form h4{font-size:14px;margin-bottom:10px;color:#553C7B}
.form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.form-group{flex:1;min-width:150px}
.form-group label{display:block;font-size:12px;color:#718096;margin-bottom:3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:6px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:13px}
.form-group textarea{min-height:50px;resize:none}
.quality-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.quality-item{display:flex;align-items:center;gap:5px;padding:5px 8px;background:white;border-radius:6px;font-size:12px;cursor:pointer}
.quality-item input{cursor:pointer}
.quality-item.checked{background:#F0FFF4}
.mood-selector{display:flex;gap:10px;justify-content:center;margin:10px 0}
.mood-option{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;border:3px solid transparent;transition:all .2s}
.mood-option:hover{transform:scale(1.1)}
.mood-option.selected{border-color:#553C7B}
.mood-5{background:#68D391}
.mood-4{background:#9AE6B4}
.mood-3{background:#F6E05E}
.mood-2{background:#F6AD55}
.mood-1{background:#FC8181}

.quick-add{margin-top:10px}

.weekday-header{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:10px}
.weekday{text-align:center;padding:10px;font-weight:600;color:#553C7B;font-size:14px}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-cell{min-height:100px;border-radius:8px;padding:8px;background:#FAFAFA;cursor:pointer;transition:all .2s;overflow:hidden}
.day-cell:hover{background:#FAF5FF;box-shadow:0 2px 8px rgba(183,148,246,.2)}
.day-cell.today{border:2px solid #B794F6}
.day-cell.empty{background:transparent;cursor:default}
.day-number{font-size:14px;font-weight:600;margin-bottom:5px}
.day-card{font-size:10px;padding:2px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-card.card-todo{background:#FFF5F5;color:#FC8181}
.day-card.card-doing{background:#FFFFF0;color:#D69E2E}
.day-card.card-done{background:#F0FFF4;color:#38A169}
.day-card.card-recorded{background:#EBF8FF;color:#3182CE}
.day-card.card-pending{background:#FFFAF0;color:#DD6B20}
.day-card.card-adopted{background:#F0FFF4;color:#38A169}
.day-card.card-abandoned{background:#EDF2F7;color:#A0AEC0;text-decoration:line-through}
.events-toolbar{background:white;padding:15px 20px;border-radius:12px;margin-bottom:20px;box-shadow:0 2px 10px rgba(0,0,0,.05);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;background:white;padding:10px 15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.filter-group{display:flex;align-items:center;gap:5px}
.filter-group label{font-size:13px;color:#718096}
.filter-group select{padding:6px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:13px}
.filter-group input{padding:6px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:13px;width:120px}
.event-table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.event-table th{background:#FAF5FF;padding:12px 10px;text-align:left;font-weight:600;font-size:13px;border-bottom:2px solid #E2E8F0}
.event-table td{padding:10px;font-size:13px;border-bottom:1px solid #F3E8FF}
.event-table tr:hover{background:#FAF5FF}
.event-table td.actions{white-space:nowrap}
.event-table td.actions .btn{padding:4px 10px;font-size:12px;margin:0 2px}
.batch-actions{display:none;background:#FFF5F5;padding:10px 15px;border-radius:10px;margin:10px 0;align-items:center;gap:10px}
.batch-actions.active{display:flex}

.project-tree{width:320px;flex-shrink:0;background:white;border-radius:12px;padding:15px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.project-detail{flex:1;background:white;border-radius:12px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.tree-btn{display:flex;align-items:center;gap:5px;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;border:1px solid transparent;background:transparent;width:100%;text-align:left;transition:all .2s}
.tree-btn:hover{background:#FAF5FF;border-color:#E9D8FD}
.tree-btn.selected{background:#E9D8FD;border-color:#B794F6;font-weight:600}
.tree-children{padding-left:20px}
.filter-bar{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.filter-bar select{padding:6px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:13px}
.tree-toolbar{display:flex;gap:8px;margin-bottom:12px}
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px}
.summary-item{padding:20px;background:white;border-radius:12px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05)}

.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}

<script>
/* ====== 工具函数 ====== */
function $$(id){return document.getElementById(id)}
function showToast(m){var t=$$('toast');t.textContent=m;t.classList.add('active');setTimeout(function(){t.classList.remove('active')},3000)}
function formatDate(d){d=new Date(d);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function loadData(k){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(e){return[]}}
function saveData(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){if(e.name==='QuotaExceededError'||e.code===22)alert('⚠️ 本地存储已满！请到「数据管理」面板导出备份。');console.error('[saveData]',e)}}

/* ====== 版本管理体系 ====== */
var APP_VERSION = '6.3';
var DATA_VERSION = 2;
var MIN_DATA_VERSION = 1;
var APP_VERSION_KEY = '_sys_data_version';
var CHANGELOG = [
  { ver: '6.2', date: '2026-05-28', changes: [
    '🔧 完全修复事件管理导入导出（CSV/XLSX，自动处理GBK/UTF-8编码）',
    '📥 智能表头匹配、自动转换日期格式和中英文类型',
    '📤 导出字段精简为12列，包含日记，不包含总结',
    '🛡️ 修复 renderTable 空数组报错，增加防御性代码',
    '🌐 全局函数挂载修复，导入按钮正常响应'
  ]},
  { ver: '6.1', date: '2026-05-28', changes: ['...']},
  { ver: '6.0', date: '2026-05-20', changes: ['...']}
];

function getStoredDataVersion() {
  try { return parseInt(localStorage.getItem(APP_VERSION_KEY)) || 0; } catch(e) { return 0; }
}
function setStoredDataVersion(v) { localStorage.setItem(APP_VERSION_KEY, v); }
function migrateData(fromVer) {
  if (fromVer >= DATA_VERSION) return;
  var v = fromVer;
  while (v < DATA_VERSION) {
    v++;
    if (v === 2) {
      var events = JSON.parse(localStorage.getItem('事件表')||'[]');
      var changed = false;
      events.forEach(function(e) {
        if (e.type === 'summary') { e.type = 'other'; changed = true; }
      });
      if (changed) localStorage.setItem('事件表', JSON.stringify(events));
    }
  }
  setStoredDataVersion(DATA_VERSION);
  console.log('[版本管理] 数据已迁移至 v' + DATA_VERSION);
}
function checkVersion() {
  var storedVer = getStoredDataVersion();
  if (storedVer > 0 && storedVer < MIN_DATA_VERSION) {
    showToast('⚠️ 数据格式过旧，请用旧版本导出后再导入');
  } else if (storedVer < DATA_VERSION) {
    migrateData(storedVer);
    if (storedVer > 0) showToast('✅ 数据已自动升级至 v' + DATA_VERSION);
  }
  var badge = $$('versionBadge');

// ====== 自动更新检测（部署后生效）======
var AUTO_UPDATE_CHECK = true;
// 检测策略：每次页面打开时检测一次（3秒后），不重复定时检测，节省流量
// 用户也可通过「检查更新」面板手动触发检测

function checkForUpdate() {
  if (window.location.protocol === 'file:') return; // 本地文件不检测
  var baseUrl = window.location.href.replace(/\/[^/]*$/, '/');
  var versionUrl = baseUrl + 'version.json?t=' + Date.now();
  fetch(versionUrl, { cache: 'no-cache' })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data && data.version && data.version !== APP_VERSION) {
        showUpdateNotification(data.version, data.changes);
      } else {
        // 检测成功但已是最新版本，更新最后检测时间
        try { localStorage.setItem('最后检查更新时间', Date.now().toString()); } catch(e) {}
      }
    })
    .catch(function() { /* 无 version.json 时静默忽略 */ });
}

function showUpdateNotification(newVersion, changes) {
  if (window._updateNotified) return;
  window._updateNotified = true;
  var notification = document.createElement('div');
  notification.style.cssText = 'position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#B794F6,#F687B3);color:#fff;padding:16px 24px;border-radius:12px;z-index:10000;box-shadow:0 4px 20px rgba(183,148,246,.4);cursor:pointer;font-size:14px;max-width:320px;line-height:1.6;';
  var changeHtml = '';
  if (changes && changes.length > 0) {
    changeHtml = '<div style="font-size:12px;opacity:.9;margin-top:8px;border-top:1px solid rgba(255,255,255,.3);padding-top:8px;">' + changes.slice(0,3).join('<br>') + '</div>';
  }
  notification.innerHTML = '🔄 发现新版本 v' + newVersion + '<br><span style="font-size:12px;opacity:.8;">点击刷新更新</span>' + changeHtml;
  notification.onclick = function() { window.location.reload(true); };
  document.body.appendChild(notification);
}

// 启动检测：每次页面打开时检测一次
if (window.location.protocol !== 'file:' && AUTO_UPDATE_CHECK) {
  setTimeout(checkForUpdate, 3000);
}

    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
};

}

function callModuleInit(tabId) {
    var fnMap = {
        'calendar': window.calendarInit,
        'events': window.eventsInit,
        'projects': window.projectsInit,
        'backup': window.backupInit
    };
    var fn = fnMap[tabId];
    if (typeof fn === 'function' && !_modInit[tabId]) {
        fn();
        _modInit[tabId] = true;
    }
    if (tabId === 'events' && typeof window.eventsRefresh === 'function') window.eventsRefresh();
    if (tabId === 'calendar' && typeof window.calendarRefresh === 'function') window.calendarRefresh();
    if (tabId === 'projects' && typeof window.projectsRefresh === 'function') window.projectsRefresh();
    if (tabId === 'backup' && typeof window.backupRefresh === 'function') window.backupRefresh();
}

function switchTab(id, btn) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    var panel = document.getElementById('panel-' + id);
    if (panel) panel.classList.add('active');
    callModuleInit(id);
}
// 空函数占位（保留供扩展）
function loadHomeStats(){

  var today=formatDate(new Date());
  var todayEvents=events.filter(function(e){return e.date===today && e.type!=='diary'});
  var done=todayEvents.filter(function(e){return e.status==='done'}).length;
  var todo=todayEvents.filter(function(e){return e.status==='todo'||e.status==='doing'}).length;
  var rate=todayEvents.length>0?Math.round(done/todayEvents.length*100):0;
  var diaryEvent=events.find(function(e){return e.date===today && e.type==='diary'});
  var mood=diaryEvent&&diaryEvent.mood?diaryEvent.mood:'-';

  var el;
  el=$$('homeTodayTotal');if(el)el.textContent=todayEvents.length;
  el=$$('homeTodayDone');if(el)el.textContent=done;
  el=$$('homeTodayTodo');if(el)el.textContent=todo;
  el=$$('homeRate');if(el)el.textContent=rate+'%';
  /* 今日情绪 */
  el=$$('homeMoodDisplay');if(el){el.textContent=mood==='-'?'暂无记录':(['','😢','😔','😐','🙂','😊'][mood]||'-');}

  el=$$('homeEventList');if(el){
    if(todayEvents.length===0){el.innerHTML='<div class="empty-state">今天暂无事件</div>';}

      var eh='';var sorted=todayEvents.slice().sort(function(a,b){return(a.time||'').localeCompare(b.time||'')});

        else if(ev.type==='reminder')cls='type-reminder';
        else if(ev.type==='plan')cls='type-plan-status-'+(ev.status||'todo');

        eh+='<span class="home-event-time">'+timeStr+'</span>';
        eh+='<span>'+statusIcon+' '+escH(ev.content||ev.title||'无标题')+'</span>';
        eh+='</div>';
      }
      el.innerHTML=eh;
    }
  }
  /* 进行中项目 */
  el=$$('homeProjectList');if(el){
    var activeProjects=projects.filter(function(p){return !p.parentId&&(p.status==='doing'||p.status==='todo')});
    activeProjects.sort(function(a,b){return (a.sortOrder||0)-(b.sortOrder||0);});
    if(activeProjects.length===0){el.innerHTML='<div class="empty-state">暂无进行中的项目</div>';}
    else{
      var ph='';
      for(var j=0;j<activeProjects.length;j++){
        var pr=activeProjects[j];var pcls='status-'+(pr.status||'todo');
        ph+='<div class="home-project-item '+pcls+'" onclick="switchTab(\'projects\');selectProject(\''+pr.id+'\')" title="点击查看项目甘特图">';
        ph+='<span>🎯 '+escH(pr.name||'未命名')+'</span>';
        ph+='</div>';
      }
      el.innerHTML=ph;
    }
  }
  /* 一周时长统计（本周已过天数） */
  el=$$('homeDurationStats');if(el){
    var now=new Date(),dow=now.getDay(),mon=new Date(now);
    mon.setDate(now.getDate()-(dow===0?6:dow-1));
    var weekDays=[];for(var wd=0;wd<7;wd++){var dd=new Date(mon);dd.setDate(mon.getDate()+wd);if(dd<=now)weekDays.push(formatDate(dd));}
    var durMap={},hasDur=false;
    events.forEach(function(e){
      if(weekDays.indexOf(e.date)>=0&&e.time&&e.endTime){
        var t1=e.time.split(':'),t2=e.endTime.split(':');
        var mins=(parseInt(t2[0])*60+parseInt(t2[1]))-(parseInt(t1[0])*60+parseInt(t1[1]));
        if(mins>0){var dm=e.domain||'other';durMap[dm]=(durMap[dm]||0)+mins;hasDur=true;}

    });
    if(hasDur){

      var dEmoji={work:'💼',study:'📚',health:'🏃',family:'👨‍👩‍👧',social:'👥',hobby:'🎨',mind:'🧘',other:'📌'};
      var dHtml='';
      var dKeys=Object.keys(durMap).sort(function(a,b){return durMap[b]-durMap[a];});
      dKeys.forEach(function(k){
        dTotal+=durMap[k];

        var dLabel=(window.DOMAIN_NAMES&&window.DOMAIN_NAMES[k])||k;

      var dth=Math.floor(dTotal/60),dtm=dTotal%60;
      dHtml+='<span style=\"background:#F3E8FF;padding:3px 10px;border-radius:12px;font-size:12px;color:#553C7B;font-weight:600;\">本周 '+dth+'h'+(dtm?' '+dtm+'m':'')+'</span>';
      el.innerHTML=dHtml;
    }else{el.innerHTML='<span class=\"empty-state\">本周暂无带时长的事件</span>';}
  }
  /* 本周完成率趋势 */
  el=$$('homeWeekTrend');if(el){
    var now=new Date();var dow=now.getDay();var mon=new Date(now);mon.setDate(now.getDate()-(dow===0?6:dow-1));
    var th='';var dayNames=['周一','周二','周三','周四','周五','周六','周日'];
    for(var k=0;k<7;k++){
      var dd=new Date(mon);dd.setDate(mon.getDate()+k);
      var ds=formatDate(dd);var isFuture=dd>now;
      var dayEvts=events.filter(function(e){return e.date===ds&&e.type!=='diary'});

      var dayRate=dayEvts.length>0?Math.round(dayDone/dayEvts.length*100):0;
      var barH=Math.max(dayRate*0.8,4);
      var barColor=isFuture?'#E2E8F0':(dayRate>=80?'#68D391':dayRate>=50?'#F6AD55':'#FC8181');
      var pctColor=isFuture?'#A0AEC0':'#718096';
      th+='<div class="home-trend-col">';
      th+='<div class="home-trend-pct" style="color:'+pctColor+'">'+(isFuture?'-':dayRate+'%')+'</div>';
      th+='<div class="home-trend-bar" style="height:'+barH+'px;background:'+barColor+'"></div>';
      th+='<div class="home-trend-day">'+dayNames[k]+'</div>';
      th+='</div>';
    }
    el.innerHTML=th;
  }
  }catch(e){console.error('[loadHomeStats]',e)}
}
var escH=window.escapeHtml;

/* ====== 修复后的核心函数 ====== */
function parseCSVLine(line) {
    var result = [], current = '', inQuotes = false;
    for (var i = 0; i < line.length; i++) {
        var ch = line[i];
        if (ch === '"') inQuotes = !inQuotes;
        else if (ch === ',' && !inQuotes) {
            result.push(current);
            current = '';
        } else current += ch;
    }
    result.push(current);
    return result;
}
function normalizeDate(d) {
    if (!d) return '';
    d = String(d).trim();
    // Excel 数值日期（如 45876）
    if (/^\d{4,5}(\.\d+)?$/.test(d) && parseInt(d) > 40000) {
        var excelEpoch = new Date(1899, 11, 30);
        var dt = new Date(excelEpoch.getTime() + parseFloat(d) * 86400000);
        return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
    }
    var parts = d.split(/[\/\-\.]/);
    if (parts.length === 3) {
        return parts[0] + '-' + parts[1].padStart(2,'0') + '-' + parts[2].padStart(2,'0');
    }
    return d;
}
var typeMapCN = { '计划':'plan','日志':'log','提醒':'reminder','灵感':'idea','日记':'diary','其他':'other' };
var domainMapCN = { '工作':'work','学习':'study','健康':'health','家庭':'family','社交':'social','兴趣':'hobby','心灵':'mind' };
var priorityMapCN = { '高':'high','中':'medium','低':'low' };
var statusMapCN = { '待办':'todo','进行中':'doing','已完成':'done','已记录':'recorded','待处理':'pending','已采纳':'adopted','已放弃':'abandoned' };

window.triggerEventsImport = function() {
    var inp = document.getElementById('eventsFileInput');
    if (!inp) {
        inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = '.csv,.xlsx,.xls';
        inp.id = 'eventsFileInput';
        inp.style.display = 'none';
        document.body.appendChild(inp);
    }
    inp.onchange = window.handleEventsFileImport;
    inp.click();
};

window.handleEventsFileImport = function(event) {
    var file = event.target.files[0];
    if (!file) return;
    var ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'xlsx' || ext === 'xls') {
        var reader = new FileReader();
        reader.onload = function(e) {
            var data = new Uint8Array(e.target.result);
            var wb = XLSX.read(data, { type: 'array' });
            var sheet = wb.Sheets[wb.SheetNames[0]];
            var csv = XLSX.utils.sheet_to_csv(sheet);
            var lines = csv.split('\n').filter(function(l) { return l.trim(); });
            if (lines.length < 2) { alert('文件为空'); return; }
            window.importEventsCSV(lines, false);
        };
        reader.readAsArrayBuffer(file);
        event.target.value = '';
        return;
    }
    // CSV 尝试 UTF-8 和 GBK
    var encodings = ['UTF-8', 'GBK'];
    var results = [];
    var tryNext = function(idx) {
        if (idx >= encodings.length) {
            if (results.length === 0) { alert('无法识别文件编码，请确保文件为 UTF-8 或 GBK 编码。'); return; }
            results.sort(function(a,b) { return b.lines.length - a.lines.length; });
            var best = results[0];
            if (best.lines.length >= 2) window.importEventsCSV(best.lines, false);
            else alert('文件内容太少或无法解析');
            return;
        }
        var enc = encodings[idx];
        var r = new FileReader();
        r.onload = function(e) {
            var content = e.target.result;
            if (content.charCodeAt(0) === 0xFEFF) content = content.slice(1);
            var lines = content.split('\n').filter(function(l) { return l.trim(); });
            var hasChinese = /[\u4e00-\u9fa5]/.test(content);
            var hasGarbled = content.indexOf('�') !== -1 || (/[\x00-\x08\x0B\x0C\x0E-\x1F]/.test(content) && !hasChinese);
            results.push({ encoding: enc, lines: lines, garbled: hasGarbled });
            if (!hasGarbled && lines.length >= 2) {
                window.importEventsCSV(lines, false);
                return;
            }
            tryNext(idx+1);
        };
        r.readAsText(file, enc);
    };
    tryNext(0);
    event.target.value = '';
};

window.importEventsCSV = function(lines, replace) {
    if (!lines || lines.length < 2) { alert('文件无效'); return; }
    var rawHeaders = parseCSVLine(lines[0]);
    var headers = rawHeaders.map(function(h) { return h.trim().replace(/^["']|["']$/g, '').replace(/^\uFEFF/, ''); });
    function findIdx(keywords) {
        for (var i = 0; i < headers.length; i++) {
            var h = headers[i].toLowerCase();
            for (var k = 0; k < keywords.length; k++) {
                if (h.indexOf(keywords[k]) !== -1) return i;
            }
        }
        return -1;
    }
    var col = {
        id: findIdx(['事件id','id']),
        date: findIdx(['日期']),
        time: findIdx(['时间']),
        endTime: findIdx(['结束时间','endtime','end_time']),
        type: findIdx(['类型']),
        content: findIdx(['内容']),
        domain: findIdx(['维度']),
        projectId: findIdx(['项目id','projectid']),
        projectName: findIdx(['项目名称']),
        priority: findIdx(['优先级']),
        status: findIdx(['状态']),
        tags: findIdx(['备注','标签']),
        createdAt: findIdx(['创建时间','createdat'])
    };
    if (col.date === -1 || col.content === -1) {
        alert('无法识别表头。请确保表头包含“日期”和“内容”列。\n实际表头：' + headers.join(', '));
        return;
    }
    var events = replace ? [] : JSON.parse(localStorage.getItem('事件表') || '[]');
    var imported = 0, updated = 0;
    for (var i = 1; i < lines.length; i++) {
        var parts = parseCSVLine(lines[i]);
        while (parts.length < headers.length) parts.push('');
        var originalId = (col.id !== -1 && parts[col.id]) ? parts[col.id].trim() : '';
        var evtDate = normalizeDate((col.date !== -1 ? parts[col.date] : '').trim()) || formatDate(new Date());
        var newId = originalId && originalId.match(/^E-\d{8}-\d{3}$/) ? originalId : generateEventId(evtDate);
        var existingIndex = -1;
        if (originalId) existingIndex = events.findIndex(function(e) { return e.originalId === originalId || e.id === originalId || e.id === newId; });
        var rawType = (col.type !== -1 ? parts[col.type] : '').trim();
        var rawDomain = (col.domain !== -1 ? parts[col.domain] : '').trim();
        var rawPriority = (col.priority !== -1 ? parts[col.priority] : '').trim();
        var rawStatus = (col.status !== -1 ? parts[col.status] : '').trim();
        var newEvent = {
            id: newId,
            originalId: originalId || newId,
            date: normalizeDate((col.date !== -1 ? parts[col.date] : '').trim()),
            time: (col.time !== -1 ? parts[col.time] : '').trim(),
            endTime: (col.endTime !== -1 ? parts[col.endTime] : '').trim(),
            type: typeMapCN[rawType] || rawType.toLowerCase() || 'other',
            content: (col.content !== -1 ? parts[col.content] : '').trim(),
            domain: domainMapCN[rawDomain] || rawDomain.toLowerCase() || 'work',
            projectId: (col.projectId !== -1 ? parts[col.projectId] : '').trim(),
            projectName: (col.projectName !== -1 ? parts[col.projectName] : '').trim(),
            priority: priorityMapCN[rawPriority] || rawPriority.toLowerCase() || 'medium',
            status: statusMapCN[rawStatus] || rawStatus.toLowerCase() || 'todo',
            tags: (col.tags !== -1 ? parts[col.tags] : '').trim(),
            createdAt: (col.createdAt !== -1 ? parts[col.createdAt] : new Date().toISOString()).trim()
        };
        if (existingIndex !== -1) {
            var old = events[existingIndex];
            old.originalId = originalId;
            old.date = newEvent.date;
            old.time = newEvent.time;
            old.type = newEvent.type;
            old.content = newEvent.content;
            old.domain = newEvent.domain;
            old.projectId = newEvent.projectId;
            old.projectName = newEvent.projectName;
            old.priority = newEvent.priority;
            old.status = newEvent.status;
            old.tags = newEvent.tags;
            old.createdAt = newEvent.createdAt;
            updated++;
        } else {
            events.push(newEvent);
            imported++;
        }
    }
    localStorage.setItem('事件表', JSON.stringify(events));
    alert('✅ 导入完成：新增 ' + imported + ' 条，更新 ' + updated + ' 条');
    if (typeof window.eventsRefresh === 'function') window.eventsRefresh();
    else if (typeof window.renderTable === 'function') window.renderTable(events);
    if (typeof loadHomeStats === 'function') loadHomeStats();
};

window.renderTable = function(data) {
    data = data || [];
    if (!Array.isArray(data)) data = [];
    var tbody = document.getElementById('eventTableBody');
    var emptyState = document.getElementById('emptyState');
    var table = document.querySelector('.table-container table');
    if (!tbody) return;
    if (data.length === 0) {
        tbody.innerHTML = '';
        if (emptyState) emptyState.style.display = 'block';
        if (table) table.style.display = 'none';
    } else {
        if (emptyState) emptyState.style.display = 'none';
        if (table) table.style.display = 'table';
        var isBatchMode = window.isBatchMode === true;
        var html = '';
        for (var i = 0; i < data.length; i++) {
            var e = data[i];
            var typeIcon = (window.TYPE_ICONS && window.TYPE_ICONS[e.type]) || '📌';
            var typeName = (window.TYPE_NAMES && window.TYPE_NAMES[e.type]) || e.type || '未知';
            var domainIcon = (window.DOMAIN_ICONS && window.DOMAIN_ICONS[e.domain]) || '';
            var domainName = (window.DOMAIN_NAMES && window.DOMAIN_NAMES[e.domain]) || '-';
            var statusClass = (window.STATUS_CLASSES && window.STATUS_CLASSES[e.status]) || '';
            var statusName = (window.STATUS_NAMES && window.STATUS_NAMES[e.status]) || e.status || '未知';
            var contentShort = e.content ? (e.content.length > 30 ? e.content.substring(0,30)+'...' : e.content) : '';
            html += '<tr>';
            if (isBatchMode) html += '<td class="checkbox-cell"><input type="checkbox" class="event-checkbox" value="' + (e.id||'') + '"></td>';
            else html += '<td class="checkbox-cell"></td>';
            html += '<td>' + (e.date||'-') + '</td>';
            html += '<td>' + fmtTimeRange(e.time, e.endTime) + '</td>';
            html += '<td><span class="type-icon">' + typeIcon + '</span>' + typeName + '</td>';
            html += '<td title="' + (e.content||'') + '">' + contentShort + '</td>';
            html += '<td><span class="domain-icon">' + domainIcon + '</span>' + domainName + '</td>';
            html += '<td>' + (e.projectName||'-') + '</td>';
            html += '<td><span class="status ' + statusClass + '">' + statusName + '</span></td>';
            html += '<td><button class="action-btn action-edit" onclick="editEvent(\'' + (e.id||'') + '\')">编辑</button> ';
            html += '<button class="action-btn action-delete" onclick="deleteEvent(\'' + (e.id||'') + '\')">删除</button></td>';
            html += '</tr>';
        }
        tbody.innerHTML = html;
    }
    var countInfo = document.getElementById('countInfo');
    var allEvents = JSON.parse(localStorage.getItem('事件表')||'[]');
    if (countInfo) countInfo.textContent = '共 ' + allEvents.length + ' 条事件，显示 ' + data.length + ' 条';
};

window.eventsRefresh = function() {
    var all = JSON.parse(localStorage.getItem('事件表')||'[]');
    var type = document.getElementById('filterType') ? document.getElementById('filterType').value : '';
    var domain = document.getElementById('filterDomain') ? document.getElementById('filterDomain').value : '';
    var status = document.getElementById('filterStatus') ? document.getElementById('filterStatus').value : '';
    var keyword = document.getElementById('filterKeyword') ? document.getElementById('filterKeyword').value.toLowerCase() : '';
    var date = document.getElementById('filterDate') ? document.getElementById('filterDate').value : '';
    var filtered = all;
    if (type) filtered = filtered.filter(function(e) { return e.type === type; });
    if (domain) filtered = filtered.filter(function(e) { return e.domain === domain; });
    if (status) filtered = filtered.filter(function(e) { return e.status === status; });
    if (keyword) filtered = filtered.filter(function(e) { return e.content && e.content.toLowerCase().includes(keyword); });
    if (date) filtered = filtered.filter(function(e) { return e.date === date; });
    filtered.sort(function(a, b) {
        if (a.date !== b.date) return a.date > b.date ? -1 : 1;
        return (a.time || '') < (b.time || '') ? -1 : 1;
    });
    window.renderTable(filtered);
};

window.exportEventsXLSX = function() {
    if (typeof XLSX === 'undefined') { alert('XLSX库未加载，请刷新页面'); return; }
    var all = JSON.parse(localStorage.getItem('事件表')||'[]');
    var events = all.filter(function(e) { return e.type !== 'summary'; });
    var headers = ['事件ID','日期','时间','结束时间','类型','内容','维度','项目ID','项目名称','优先级','状态','备注','创建时间','更新时间'];
    if (events.length === 0) {
        var desc = ['必填唯一ID','YYYY-MM-DD','HH:MM','HH:MM（可选）','plan/log/reminder/idea/diary/other','内容','work/study/health/family/social/hobby/mind','项目ID','项目名称','high/medium/low','todo/doing/done/recorded/pending/adopted/abandoned','备注（情绪/感悟/关键词）','ISO时间','ISO时间'];
        var ws = XLSX.utils.aoa_to_sheet([headers, desc]);
        ws['!cols'] = headers.map(function(){ return {wch:18}; });
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '事件表模板');
        XLSX.writeFile(wb, '事件表_导入模板_' + fmtTimestamp() + '.xlsx');
        alert('模板已导出');
        return;
    }
    var typeMapEN = { 'plan':'计划','log':'日志','reminder':'提醒','idea':'灵感','diary':'日记','other':'其他' };
    var domainMapEN = { 'work':'工作','study':'学习','health':'健康','family':'家庭','social':'社交','hobby':'兴趣','mind':'心灵' };
    var priorityMapEN = { 'high':'高','medium':'中','low':'低' };
    var statusMapEN = { 'todo':'待办','doing':'进行中','done':'已完成','recorded':'已记录','pending':'待处理','adopted':'已采纳','abandoned':'已放弃' };
    var rows = events.map(function(e) {
        return [
            e.id||'', e.date||'', e.time||'', e.endTime||'',
            typeMapEN[e.type] || e.type || '其他',
            e.content||'',
            domainMapEN[e.domain] || e.domain || '其他',
            e.projectId||'', e.projectName||'',
            priorityMapEN[e.priority] || e.priority || '',
            statusMapEN[e.status] || e.status || '',
            e.tags||'',
            fmtDateTime(e.createdAt)

        var formDate = (document.getElementById('eventFormDate') ? document.getElementById('eventFormDate').value : '') || new Date().toISOString().slice(0, 10);
        var data = {
            id: window._editingId || generateEventId(formDate),
            originalId: '',
            date: (document.getElementById('eventFormDate') ? document.getElementById('eventFormDate').value : '') || new Date().toISOString().slice(0, 10),
            time: document.getElementById('eventTime').value || '',
            endTime: document.getElementById('eventEndTime') ? document.getElementById('eventEndTime').value || '' : '',
            type: document.getElementById('eventType').value,
            content: document.getElementById('eventContent').value.trim(),
            domain: document.getElementById('eventDomain').value,
            status: document.getElementById('eventStatus').value,
            priority: 'medium',
            projectId: chosenProjId,
            projectName: chosenProj ? (chosenProj.name || '') : '',
            tags: '',
            createdAt: new Date().toISOString()
        };
        if (!data.content) { alert('请输入事件内容'); return; }
        var oldDate = '';
        if (window._editingId) {
            for (var i = 0; i < events.length; i++) {
                if (events[i].id === window._editingId) {
                    oldDate = events[i].date || '';
                    events[i].date = data.date;
                    events[i].time = data.time;
                    events[i].endTime = data.endTime;
                    events[i].type = data.type;
                    events[i].content = data.content;
                    events[i].domain = data.domain;
                    events[i].status = data.status;
                    events[i].projectId = data.projectId;
                    events[i].projectName = data.projectName;
                    break;
                }
            }
        } else {
            data.originalId = data.id;
            events.unshift(data);
        }
        localStorage.setItem('事件表', JSON.stringify(events));
        var wasEditing = !!window._editingId; // 在closeEventModal前记录是否编辑模式
        var editingNewDate = data.date;
        var editingOldDate = oldDate;
        window.closeEventModal();
        window.eventsRefresh();
        // 刷新日历视图：每次保存都强制重渲染，并在日期跨周时自动跳转
        try {
            // 判断新日期是否在当前显示周范围内
            var needJump = false;
            if (editingNewDate && typeof window._calWeekStart !== 'undefined') {
                var pp = editingNewDate.split('-');
                var newD = new Date(parseInt(pp[0]), parseInt(pp[1]) - 1, parseInt(pp[2]));
                var weekEnd = new Date(window._calWeekStart);
                weekEnd.setDate(weekEnd.getDate() + 6);
                // 新日期不在当前周（周日~周六）范围内，则跳转
                if (newD < window._calWeekStart || newD > weekEnd) {
                    needJump = true;
                    var dow = newD.getDay(); // 0=周日
                    newD.setDate(newD.getDate() - dow);
                    window._calWeekStart = new Date(newD.getFullYear(), newD.getMonth(), newD.getDate());
                }
            }
            // 无论是否跳转都强制重渲染
            if (typeof window._calRenderWeek === 'function' && (typeof window._calView === 'undefined' || window._calView === 'week')) {
                window._calRenderWeek();
            } else if (typeof window.calendarRefresh === 'function') {
                window.calendarRefresh();
            }
        } catch(err) { console.error('[eventSave] 日历刷新失败:', err); }
        if (typeof loadHomeStats === 'function') loadHomeStats();
        showToast(wasEditing ? '✅ 已更新' : '✅ 已新增');
    }
}, false);

/* ====== 通用ID生成（全局） ====== */
function _genId(prefix, dateStr) {
    var today = (dateStr || formatDate(new Date())).replace(/-/g, '');
    var storeKey = prefix === 'P' ? '项目表' : prefix === 'E' ? '事件表' : '今日总结';
    var items = JSON.parse(localStorage.getItem(storeKey) || '[]');
    var maxSeq = 0;
    items.forEach(function(item) {
        if (item.id) {
            var m = String(item.id).match(new RegExp('^' + prefix + '-' + today + '-(\\d{3})$'));
            if (m) maxSeq = Math.max(maxSeq, parseInt(m[1]));
        }
        if (prefix === 'S' && item.date && String(item.date).replace(/-/g,'') === today) {
            maxSeq = Math.max(maxSeq, 1);
        }
    });
    return prefix + '-' + today + '-' + String(maxSeq + 1).padStart(3, '0');
}
function generateEventId(dateStr) { return _genId('E', dateStr); }
function generateSummaryId(dateStr) { return _genId('S', dateStr); }
function generateProjectId() { return _genId('P'); }

        var p = window.projects.find(function(p){ return p.id === id; });
        if (!p) return;
        var next = { doing: 'paused', paused: 'doing', done: 'archived', archived: 'doing' };
        p.status = next[p.status] || 'doing';
        saveProjects();
        window.renderTree();
        if (window.selectedProjectId === id) window.selectProject(id);
        showToast('状态已切换');
    };

    // ---------- 项目上下移动排序 ----------
    window.moveProjectOrder = function(id, dir, parentId) {
        var siblings = window.projects.filter(function(p){ return (p.parentId||'') === (parentId||''); });
        siblings.sort(function(a,b){return (a.sortOrder||0)-(b.sortOrder||0);});
        var idx = -1;
        for(var i=0;i<siblings.length;i++){if(siblings[i].id===id){idx=i;break;}}
        if(idx===-1)return;
        var swapIdx = idx+dir;
        if(swapIdx<0||swapIdx>=siblings.length)return;
        var tmp = siblings[idx].sortOrder||0;
        siblings[idx].sortOrder = siblings[swapIdx].sortOrder||0;
        siblings[swapIdx].sortOrder = tmp;
        saveProjects();
        window.renderTree();
    };

    // ---------- 树渲染 ----------
    window.renderTree = function() {
        var tree = document.getElementById('projectTree');
        if (!tree) return;
        var filterStatus = document.getElementById('projectFilterStatus') ? document.getElementById('projectFilterStatus').value : '';
        var filtered = window.projects.filter(function(p){ return !filterStatus || p.status === filterStatus; });
        filtered.sort(function(a,b){return (a.sortOrder||0)-(b.sortOrder||0);});
        var top = filtered.filter(function(p){ return !p.parentId; });
        if (!top.length) { tree.innerHTML = '<div class="empty-state"><p>暂无项目</p></div>'; return; }

        function renderNode(project, level) {
            var children = filtered.filter(function(p){ return p.parentId === project.id; }).sort(function(a,b){return (a.sortOrder||0)-(b.sortOrder||0);});
            var hasChildren = children.length > 0;
            var expanded = window._expandState[project.id];
            var isSelected = window.selectedProjectId === project.id;
            var progress = window.calculateProgress(project.id);
            var checkbox = window.projBatchMode ? '<input type="checkbox" class="project-checkbox" value="'+project.id+'" style="margin-right:8px;">' : '';
            var toggle = hasChildren
                ? '<span class="tree-toggle" data-id="'+project.id+'" style="cursor:pointer;margin-right:4px;font-size:12px;display:inline-block;width:16px;">'+(expanded?'▼':'▶')+'</span>'
                : '<span style="display:inline-block;width:20px;"></span>';
            var folder = expanded ? '📂' : '📁';
            var html = '<div class="tree-node">'
                + '<div class="node-content'+(isSelected?' active':'')+'" style="padding-left:'+(level*20)+'px;">'
                + '<div class="node-row1">'
                + checkbox + toggle
                + '<span class="node-icon" style="color:'+(project.color||'#B794F6')+'">'+folder+'</span>'
                + '<span class="node-name" style="cursor:pointer;" onclick="selectProject(\''+project.id+'\')">'+escapeHtml(project.name)+'</span>'
                + '</div>'
                + '<div class="node-row2">'
                + '<span class="node-status '+(P_STATUS_CLASS[project.status]||'')+'">'+( P_STATUS_NAME[project.status]||project.status)+'</span>'
                + '</div>'
                + '<div class="node-row3">'
                + '<span class="sort-arrows">'
                + '<span style="cursor:pointer;" onclick="event.stopPropagation();moveProjectOrder(\''+project.id+'\',-1,\''+project.parentId+'\')" title="上移">▲</span>'
                + '<span style="cursor:pointer;" onclick="event.stopPropagation();moveProjectOrder(\''+project.id+'\',1,\''+project.parentId+'\')" title="下移">▼</span>'
                + '</span>'
                + '<button class="btn btn-sm" style="background:#EBF8FF;color:#3182CE;font-size:11px;padding:2px 8px;" onclick="event.stopPropagation();editProject(\''+project.id+'\')">编辑</button>'
                + '<button class="btn btn-sm" style="background:#FFF5F5;color:#E53E3E;font-size:11px;padding:2px 8px;" onclick="event.stopPropagation();deleteProject(\''+project.id+'\')">删除</button>'
                + '</div>'
                + '</div>'
                + '<div class="progress-bar" style="margin-left:'+(level*20+20)+'px;"><div class="progress-fill" style="width:'+progress+'%"></div></div>';
            if (hasChildren && expanded) {
                html += '<div class="sub-nodes">' + children.map(function(c){ return renderNode(c, level+1); }).join('') + '</div>';
            }
            html += '</div>';
            return html;
        }

        tree.innerHTML = top.map(function(p){ return renderNode(p,0); }).join('');
        tree.querySelectorAll('.tree-toggle').forEach(function(el) {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                var id = this.dataset.id;
                if (id && window._expandState[id] !== undefined) {
                    window._expandState[id] = !window._expandState[id];
                    window.renderTree();
                }
            });
        });
        if (window.projBatchMode) {
            tree.querySelectorAll('.project-checkbox').forEach(function(cb){ cb.addEventListener('change', updateSelectedCount); });
            updateSelectedCount();
        }
    };

    function updateSelectedCount() {
        var checked = document.querySelectorAll('.project-checkbox:checked');
        var span = document.getElementById('projectSelectedCount');
        if (span) span.textContent = checked.length;
        var allCb = document.getElementById('projectSelectAll');
        if (allCb) allCb.checked = checked.length > 0 && checked.length === document.querySelectorAll('.project-checkbox').length;
    }

    // ---------- 甘特图（按自然月显示，支持翻月） ----------
    // monthOffset: 相对今天所在月的偏移量，0=本月，-1=上月，+1=下月
    window._ganttOffset = {};  // key: projectId → offset
    window.renderGantt = function(projectId, offset) {
        if (offset === undefined) offset = window._ganttOffset[projectId] || 0;
        window._ganttOffset[projectId] = offset;

        var today = new Date();
        var year = today.getFullYear();
        var month = today.getMonth() + offset; // 可能跨年
        // 规范化年月
        year += Math.floor(month / 12);
        month = ((month % 12) + 12) % 12;
        var monthStr = year + '-' + String(month + 1).padStart(2, '0');

        // 该月第一天和最后一天
        var minDate = new Date(year, month, 1);
        var maxDate = new Date(year, month + 1, 0); // 月末

        // 生成日期列表
        var headers = [];
        var cur = new Date(minDate);
        while (cur <= maxDate) { headers.push(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }

        var allProjects = JSON.parse(localStorage.getItem('项目表') || '[]');
        // 判断是否为父项目（有子项目）
        var childProjects = allProjects.filter(function(p) { return p.parentId === projectId; });
        var isParent = childProjects.length > 0;
        // 构建参与过滤的项目ID列表：父项目则包含所有子项目
        var projIds = isParent ? [projectId].concat(childProjects.map(function(p){return p.id;})) : [projectId];
        // 子项目颜色映射（父项目视角下才用）
        var _subColors = ['#E9D8FD','#FEEBC8','#C6F6D5','#BEE3F8','#FED7E2','#FEFCBF','#C6F6D5','#B2F5EA'];
        var subColorMap = {};
        childProjects.forEach(function(p, i) { subColorMap[p.id] = _subColors[i % _subColors.length]; });

        var events = JSON.parse(localStorage.getItem('事件表') || '[]');
        // 过滤：属于该项目（或其子项目），且任务日期或截止日与本月有交集
        var tasks = events.filter(function(e) {
            if (projIds.indexOf(e.projectId) < 0 || e.type === 'diary' || !e.date) return false;
            var start = e.date;
            var end = e.deadline || e.date;
            return start <= headers[headers.length-1] && end >= headers[0];
        });

        // 翻月按钮 + 标题
        var prevOffset = offset - 1;
        var nextOffset = offset + 1;
        var navHtml = '<div style="display:flex;align-items:center;gap:8px;margin-top:20px;margin-bottom:8px;">'
            + '<span class="card-title" style="margin:0;">📅 任务甘特图</span>'
            + '<button class="btn btn-sm" style="padding:2px 10px;font-size:12px;background:#EDF2F7;" '
            +   'onclick="window._ganttNavTo(\''+projectId+'\','+prevOffset+')">‹ 上月</button>'
            + '<span style="font-size:13px;font-weight:600;min-width:72px;text-align:center;">'+monthStr+'</span>'
            + '<button class="btn btn-sm" style="padding:2px 10px;font-size:12px;background:#EDF2F7;" '
            +   'onclick="window._ganttNavTo(\''+projectId+'\','+nextOffset+')">下月 ›</button>'
            + '</div>';

        if (!tasks.length) return navHtml + '<div class="empty-state" style="padding:12px 0 20px;">本月无关联任务</div>';

        // 父项目视角：显示子项目图例
        var legendHtml = '';
        if (isParent) {
            legendHtml = '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px;font-size:11px;">';
            childProjects.forEach(function(p, i) {
                legendHtml += '<span style="display:inline-flex;align-items:center;gap:3px;">'
                    + '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:'+_subColors[i % _subColors.length]+';"></span>'
                    + (p.name || '未命名') + '</span>';
            });
            legendHtml += '</div>';
        }

        // 2026年法定节假日（不含调休上班日）
        var _holidays2026 = {
            '2026-01-01':1,'2026-01-02':1,'2026-01-03':1,
            '2026-02-17':1,'2026-02-18':1,'2026-02-19':1,'2026-02-20':1,'2026-02-21':1,'2026-02-22':1,'2026-02-23':1,
            '2026-04-04':1,'2026-04-05':1,'2026-04-06':1,
            '2026-05-01':1,'2026-05-02':1,'2026-05-03':1,'2026-05-04':1,'2026-05-05':1,
            '2026-06-19':1,'2026-06-20':1,'2026-06-21':1,
            '2026-10-01':1,'2026-10-02':1,'2026-10-03':1,'2026-10-04':1,'2026-10-05':1,'2026-10-06':1,'2026-10-07':1,'2026-10-08':1,
            '2026-10-09':1
        };
        var _weekCN = ['日','一','二','三','四','五','六'];
        var todayStr = today.toISOString().slice(0,10);

        var html = navHtml + legendHtml
            + '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;">'
            + '<thead><tr><th style="min-width:140px;text-align:left;padding:4px 6px;">任务</th>';
        headers.forEach(function(d){
            var isToday = (d === todayStr);
            var dow = new Date(d).getDay();
            var isWeekend = (dow === 0 || dow === 6);
            var isHoliday = !!_holidays2026[d];
            var bgStyle = isHoliday ? 'background:#C6F6D5;' : (isWeekend ? 'background:#F0FFF4;' : '');
            var colorStyle = isToday ? 'color:#667EEA;font-weight:700;' : (isWeekend||isHoliday ? 'color:#276749;' : '');
            html += '<th style="min-width:28px;text-align:center;font-weight:normal;'+bgStyle+colorStyle+'">'
                + '<div>' + d.slice(8) + '</div>'
                + '<div style="font-size:10px;line-height:1.2;">' + (isHoliday ? '假' : '周'+_weekCN[dow]) + '</div>'
                + '</th>';
        });
        html += '</tr></thead><tbody>';
        tasks.forEach(function(task) {
            // 状态色
            var statusBgMap = { done: '#C6F6D5', doing: '#FEEBC8' };
            var bgColor = statusBgMap[task.status] || '#E9D8FD';
            // 父项目视角：用子项目颜色覆盖状态色，更直观
            var barColor = isParent ? (subColorMap[task.projectId] || bgColor) : bgColor;
            // 任务名：父项目视角加子项目标签
            var taskLabel = task.content.length > 16 ? task.content.slice(0,16) + '…' : task.content;
            if (isParent && task.projectId !== projectId) {
                var subName = '';
                for (var si = 0; si < childProjects.length; si++) {
                    if (childProjects[si].id === task.projectId) { subName = childProjects[si].name || ''; break; }
                }
                taskLabel = '<span style="font-size:10px;color:#718096;background:'+(subColorMap[task.projectId]||'#EDF2F7')+';border-radius:3px;padding:0 4px;margin-right:3px;">'+(subName.length>4?subName.slice(0,4):subName)+'</span>' + taskLabel;
            }
            html += '<tr><td style="border-bottom:1px solid #eee;padding:4px 6px;white-space:nowrap;">'
                + '<div style="font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;">'+taskLabel+'</div>'
                + '<div style="color:#718096;font-size:10px;">'+(task.status==='done'?'✅完成':task.status==='doing'?'🟡进行中':'🔴待办')+'</div>'
                + '</td>';
            headers.forEach(function(d) {
                var inRange = (d >= task.date && d <= (task.deadline || task.date));
                var isStart = (d === task.date);
                html += '<td style="border-left:1px solid #f0f0f0;text-align:center;background:'+(inRange?barColor:'transparent')+';padding:2px 0;">'
                    + (inRange && isStart ? '●' : (inRange ? '─' : '')) + '</td>';
            });
            html += '</tr>';
        });
        html += '</tbody></table></div>';
        return html;
    };
    // 翻月后局部刷新甘特图区域
    window._ganttNavTo = function(projectId, offset) {
        window._ganttOffset[projectId] = offset;
        // 重新渲染整个详情（最简单且最可靠）
        if (window.selectProject) window.selectProject(projectId);
    };

    // ---------- 项目详情 ----------
    window.selectProject = function(id) {
        window.selectedProjectId = id;
        window.renderTree();
        var p = window.projects.find(function(p){ return p.id === id; });
        if (!p) return;
        var children = window.projects.filter(function(c){ return c.parentId === id; });
        var progress = window.calculateProgress(id);
        var detail = document.getElementById('projectDetail');
        if (!detail) return;
        detail.innerHTML = '<div class="detail-header">'
            + '<div><div class="detail-title" style="color:'+(p.color||'#B794F6')+'">'+escapeHtml(p.name)+'</div>'
            + '<div style="font-size:13px;">'+(P_STATUS_NAME[p.status]||'')+' | '+(DOMAIN_NAMES[p.domain]||'')+'</div></div>'
            + '<div>'
            + '<button class="btn btn-warning btn-sm" onclick="toggleStatus(\''+id+'\')">切换状态</button> '
            + '<button class="btn btn-sm" style="background:#EBF8FF;" onclick="editProject(\''+id+'\')">编辑</button>'
            + '</div></div>'
            + '<div class="detail-grid" style="display:flex;gap:15px;margin:15px 0;">'
            + '<div>进度 '+progress+'%</div><div>子项目 '+children.length+'</div>'
            + '<div>截止日 '+(p.deadline||'-')+'</div><div>创建 '+(fmtDateTime(p.createdAt)||'-')+'</div>'
            + '</div>'
            + (p.goal ? '<div style="margin-bottom:15px;">目标：'+escapeHtml(p.goal)+'</div>' : '')
            + '<div><strong>子项目列表</strong></div>'
            + (children.length ? children.map(function(c){ return '<div style="cursor:pointer;padding:5px;" onclick="selectProject(\''+c.id+'\')">📁 '+escapeHtml(c.name)+' ('+(P_STATUS_NAME[c.status]||c.status)+')</div>'; }).join('') : '<div>无</div>')
            + window.renderGantt(id);
    };

    // ---------- 批量操作 ----------
    window.toggleBatchMode = function() {
        // 判断当前在哪个面板，分别处理项目/事件的批量模式
        var activePanel = document.querySelector('.tab-panel.active');
        if (activePanel && activePanel.id === 'panel-projects') {
            window.projBatchMode = !window.projBatchMode;
            var div = document.getElementById('projectBatchActions');
            if (div) div.style.display = window.projBatchMode ? 'flex' : 'none';
            if (!window.projBatchMode) document.querySelectorAll('.project-checkbox').forEach(function(cb){ cb.checked = false; });
            window.renderTree();
        } else {
            // 事件面板的批量逻辑（原有实现）
            window.isBatchMode = !window.isBatchMode;
            var batchActions = document.getElementById('batchActions');
            if (window.isBatchMode) { if (batchActions) batchActions.classList.add('active'); }
            else {
                if (batchActions) batchActions.classList.remove('active');
                document.querySelectorAll('.event-checkbox').forEach(function(cb){ cb.checked = false; });
                window.updateSelectedCount();
            }
            window.renderTable(window.getFilteredEvents ? window.getFilteredEvents() : JSON.parse(localStorage.getItem('事件表')||'[]'));
        }
    };
    window.batchDeleteProjects = function() {
        var checked = Array.from(document.querySelectorAll('.project-checkbox:checked'));
        if (!checked.length) return alert('请先勾选项目');
        if (!confirm('删除 '+checked.length+' 个项目（含子项目）？')) return;
        var ids = checked.map(function(cb){ return cb.value; });
        (function delRecur(pid) {
            window.projects.filter(function(p){ return p.parentId === pid; }).forEach(function(c){ delRecur(c.id); });
            window.projects = window.projects.filter(function(p){ return p.id !== pid; });
        });
        ids.forEach(function(id) {
            (function del(pid) {
                window.projects.filter(function(p){ return p.parentId===pid; }).forEach(function(c){ del(c.id); });
                window.projects = window.projects.filter(function(p){ return p.id!==pid; });
            })(id);
        });
        saveProjects();
        if (ids.indexOf(window.selectedProjectId) !== -1) window.selectedProjectId = null;
        window.projBatchMode = false;
        var div = document.getElementById('projectBatchActions');
        if (div) div.style.display = 'none';
        window.renderTree();
        showToast('已删除');
    };
    window.batchUpdateProjectsStatus = function() {
        var checked = Array.from(document.querySelectorAll('.project-checkbox:checked'));
        if (!checked.length) return alert('请先勾选项目');
        var newStatus = prompt('新状态 (doing/paused/done/archived)', 'doing');
        if (!newStatus || ['doing','paused','done','archived'].indexOf(newStatus) === -1) return alert('无效状态');
        var ids = checked.map(function(cb){ return cb.value; });
        window.projects.forEach(function(p){ if (ids.indexOf(p.id) !== -1) p.status = newStatus; });
        saveProjects();
        window.projBatchMode = false;
        var div = document.getElementById('projectBatchActions');
        if (div) div.style.display = 'none';
        window.renderTree();
        showToast('已更新');
    };
    window.toggleProjectSelectAll = function() {
        var allCb = document.getElementById('projectSelectAll');
        if (!allCb) return;
        document.querySelectorAll('.project-checkbox').forEach(function(cb){ cb.checked = allCb.checked; });
        updateSelectedCount();
    };

    // ---------- 导入导出 ----------
    window.exportProjectsXLSX = function() {
        if (typeof XLSX === 'undefined') return alert('XLSX库未加载');
        var data = window.projects.map(function(p){ return [p.id,p.parentId,p.name,p.domain,p.status,p.goal,p.deadline,p.color,p.createdAt]; });
        var ws = XLSX.utils.aoa_to_sheet([['项目ID','父项目ID','项目名称','维度','状态','目标','截止日','颜色','创建时间']].concat(data));
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '项目表');
        XLSX.writeFile(wb, '项目表_'+fmtTimestamp()+'.xlsx');
        alert('导出成功');
    };
    window.triggerProjectsImport = function() {
        var inp = document.createElement('input');
        inp.type = 'file'; inp.accept = '.csv,.xlsx,.xls';
        inp.onchange = function(e) {
            var file = e.target.files[0]; if (!file) return;
            var reader = new FileReader();
            reader.onload = function(ev) {
                var wb = XLSX.read(ev.target.result, { type: 'binary' });
                var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header:1, defval:'' });
                if (rows.length < 2) return alert('无数据');
                var headers = rows[0].map(function(h){ return String(h).toLowerCase(); });
                var idIdx   = headers.findIndex(function(h){ return h.includes('项目id') || h==='id'; });
                var nameIdx = headers.findIndex(function(h){ return h.includes('项目名称'); });
                if (idIdx===-1 || nameIdx===-1) return alert('缺少必要列（项目ID、项目名称）');
                var existing = JSON.parse(localStorage.getItem('项目表') || '[]');
                var imported=0, updated=0;
                for (var i=1; i<rows.length; i++) {
                    var row = rows[i]; if (!row[nameIdx]) continue;
                    var fi = function(kw){ return headers.findIndex(function(h){ return h.includes(kw); }); };
                    var pid = (row[idIdx] && String(row[idIdx]).match(/^P-\d{8}-\d{3}$/)) ? row[idIdx] : generateProjectId();
                    var data = { id: pid, parentId: row[fi('父项目id')]||'', name: row[nameIdx],
                        domain: row[fi('维度')]||'work', status: row[fi('状态')]||'doing', goal: row[fi('目标')]||'',
                        deadline: row[fi('截止日')]||'', color: row[fi('颜色')]||'#B794F6',
                        createdAt: row[fi('创建时间')]||new Date().toISOString() };
                    var idx = existing.findIndex(function(p){ return p.id === pid; });
                    if (idx !== -1) { existing[idx] = data; updated++; }
                    else { existing.push(data); imported++; }
                }
                localStorage.setItem('项目表', JSON.stringify(existing));
                window.projects = existing;
                window.renderTree();
                alert('导入完成：新增 '+imported+' 个，更新 '+updated+' 个');
            };
            reader.readAsBinaryString(file);
        };
        inp.click();
    };
    window.projectsRefresh = function() {
        window.projects = JSON.parse(localStorage.getItem('项目表') || '[]');
        var orderMap={};window.projects.forEach(function(p,i){
            if(p.sortOrder===undefined||p.sortOrder===null){p.sortOrder=i;orderMap[p.id]=i;}
        });
        if(Object.keys(orderMap).length>0)saveProjects();
        window._expandState = window._expandState || {};
        window.projects.forEach(function(p){ if (window._expandState[p.id]===undefined) window._expandState[p.id]=true; });
        window.renderTree();
    };

    // ---------- 表单提交 ----------
    var form = document.getElementById('projectForm');
    if (form) {
        var newForm = form.cloneNode(true);
        form.parentNode.replaceChild(newForm, form);
        newForm.addEventListener('submit', function(e) {
            e.preventDefault();
            var id = document.getElementById('projectId').value;
            var name = document.getElementById('projectName').value.trim();
            if (!name) return alert('请填写项目名称');
            if (!id) id = generateProjectId();
            var maxSort=0;window.projects.forEach(function(p){if((p.parentId||'')===(document.getElementById('parentId').value||'')&&(p.sortOrder||0)>maxSort)maxSort=p.sortOrder;});
            var idx = window.projects.findIndex(function(p){ return p.id===id; });
            var isEdit = idx !== -1;
            var data = { id: id, parentId: document.getElementById('parentId').value,
                name: name, domain: document.getElementById('projectDomain').value,
                status: document.getElementById('projectStatus').value,
                goal: document.getElementById('projectGoal').value,
                deadline: document.getElementById('projectDeadline').value,

function fmtTimestamp(d) {
    d = d || new Date();
    var y = d.getFullYear(), M = ('0'+(d.getMonth()+1)).slice(-2), D = ('0'+d.getDate()).slice(-2);
    var h = ('0'+d.getHours()).slice(-2), m = ('0'+d.getMinutes()).slice(-2), s = ('0'+d.getSeconds()).slice(-2);
    return y+'-'+M+'-'+D+'_'+h+m+s;
}

function fmtDateTime(iso) {
    if (!iso) return '';
    try {
        var d = new Date(iso);
        var y = d.getFullYear(), M = ('0'+(d.getMonth()+1)).slice(-2), D = ('0'+d.getDate()).slice(-2);
        var h = ('0'+d.getHours()).slice(-2), m = ('0'+d.getMinutes()).slice(-2), s = ('0'+d.getSeconds()).slice(-2);
        return y+'-'+M+'-'+D+' '+h+':'+m+':'+s;
    } catch(e) { return iso; }
}

window.importSummaryCSV = function() {
    var inp = document.createElement('input');

            var lines = [];

                if (typeof XLSX === 'undefined') { alert('XLSX库未加载'); return; }

            } else if (ext === 'csv') {

                lines = c.split('\n').filter(function(l){return l.trim();});
            } else { alert('不支持的文件格式'); return; }
            if (lines.length < 2) { alert('文件为空'); return; }
            var hdrs = parseCSVLine(lines[0]);
            function fi(kw) {
                for (var i=0;i<hdrs.length;i++){var h=hdrs[i].toLowerCase();for(var k=0;k<kw.length;k++){if(h.indexOf(kw[k])!==-1)return i;}}return -1;
            }
            var col = {date:fi(['日期']),mood:fi(['情绪']),highlights:fi(['亮点']),regret:fi(['遗憾']),exercise:fi(['运动']),weight:fi(['体重']),learning:fi(['学习']),createdAt:fi(['创建时间']),updatedAt:fi(['更新时间'])};
            var qc = {cx:fi(['诚信']),zz:fi(['专注']),nx:fi(['耐心']),zl:fi(['自律']),ge:fi(['感恩']),jc:fi(['坚持']),yq:fi(['勇气']),zh:fi(['智慧']),cb:fi(['慈悲']),qx:fi(['谦逊'])};
            if (col.date===-1){alert('缺少"日期"列');return;}
            var summaries = JSON.parse(localStorage.getItem('今日总结') || '[]');
            var imported=0, updated=0;
            for (var i=1;i<lines.length;i++){
                var parts=parseCSVLine(lines[i]);if(parts.length<2)continue;
                var date=normalizeDate(parts[col.date]);if(!date)continue;
                var ql=[];var qm=[['cx','诚信'],['zz','专注'],['nx','耐心'],['zl','自律'],['ge','感恩'],['jc','坚持'],['yq','勇气'],['zh','智慧'],['cb','慈悲'],['qx','谦逊']];

                var now=new Date().toISOString();
