<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','微软雅黑',sans-serif;background:linear-gradient(135deg,#FAF5FF 0%,#F3E8FF 100%);min-height:100vh;color:#553C7B}
.container{max-width:100%;margin:0 auto;padding:20px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .3s}
.btn:hover{transform:translateY(-2px)}
.btn-primary{background:linear-gradient(135deg,#B794F6 0%,#F687B3 100%);color:#fff}
.btn-success{background:linear-gradient(135deg,#68D391 0%,#48BB78 100%);color:#fff}
.btn-warning{background:linear-gradient(135deg,#F6AD55 0%,#ED8936 100%);color:#fff}
.btn-danger{background:linear-gradient(135deg,#FC8181 0%,#E53E3E 100%);color:#fff}
.btn-info{background:#E2E8F0;color:#553C7B}
.btn-sm{padding:6px 12px;font-size:12px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:15px}
.card-title{font-size:16px;font-weight:600;margin-bottom:15px;color:#553C7B}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;padding:30px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto}
.modal h3{margin-bottom:20px;font-size:18px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#553C7B;color:#fff;padding:12px 24px;border-radius:25px;z-index:2000;display:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@media(max-width:1024px){.main-layout{flex-direction:column}.sidebar-section{width:100% !important}.week-section{min-width:0}.timeline-table{font-size:12px;min-width:800px}}
@media(max-width:768px){.tab-btn{padding:10px 12px;font-size:12px}.container{padding:10px}.stats-grid{grid-template-columns:1fr !important}.overview-grid{grid-template-columns:repeat(2,1fr)}.data-stats{grid-template-columns:repeat(2,1fr)}.summary-row{grid-template-columns:repeat(2,1fr)}.btn-group{flex-wrap:wrap}.modal{width:95%;padding:20px}.quick-stats{grid-template-columns:repeat(2,1fr)}.top-nav{padding:8px 15px}.nav-brand{font-size:16px}.home-overview{grid-template-columns:1fr !important}.week-grid{overflow-x:auto;-webkit-overflow-scrolling:touch}.toolbar{flex-direction:column;align-items:stretch;gap:10px}.toolbar .week-nav{justify-content:center}.toolbar>div:last-child{justify-content:center;flex-wrap:wrap}.timeline-table{min-width:700px;font-size:11px}}
.brand-header{background:linear-gradient(135deg,#B794F6 0%,#F687B3 100%);padding:14px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;flex-shrink:0;text-align:center}
.brand-top-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.brand-logo{width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-logo img{width:40px;height:40px;border-radius:50%;object-fit:cover}
.brand-title{font-size:32px;font-weight:700;line-height:1.2}
.brand-name{font-size:20px;font-weight:700;line-height:1.4;margin-top:4px;margin-bottom:6px}
.brand-bottom-row{display:flex;align-items:center;justify-content:center;position:relative;width:100%;margin-top:2px}
.brand-slogan-wrap{display:flex;align-items:center;justify-content:center}
.brand-actions-right{position:absolute;right:0;display:flex;align-items:center;gap:8px}
.brand-action{font-size:12px;opacity:.9;cursor:pointer;transition:opacity .2s;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.15);white-space:nowrap}
.brand-action:hover{opacity:1;background:rgba(255,255,255,.25)}
.brand-divider{font-size:10px;opacity:.4}
.brand-slogan{font-size:12px;opacity:.85;line-height:1.4;white-space:nowrap}
.tab-nav{background:#fff;display:flex;padding:0 20px;box-shadow:0 2px 10px rgba(0,0,0,.05);overflow-x:auto}
.tab-btn{padding:15px 25px;border:none;background:0 0;cursor:pointer;font-size:14px;font-weight:500;color:#718096;border-bottom:3px solid transparent;transition:all .3s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.tab-btn:hover{color:#B794F6;background:#FAF5FF}
.tab-btn.active{color:#B794F6;border-bottom-color:#B794F6}
.tab-icon{font-size:18px}
.tab-content{padding:20px;min-height:calc(100vh - 120px)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.top-nav{background:linear-gradient(135deg,#B794F6 0%,#F687B3 100%);padding:15px 30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(183,148,246,.3)}
.nav-brand{color:#fff;font-size:20px;font-weight:700}
.nav-brand span{font-size:12px;opacity:.8;font-weight:400;margin-left:10px}
.nav-actions{display:flex;gap:10px}
.nav-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;transition:background .3s}
.nav-btn:hover{background:rgba(255,255,255,.3)}
.module-icon{font-size:32px;margin-bottom:10px}
.module-name{font-size:14px;font-weight:600}
.module-desc{font-size:12px;color:#718096;margin-top:5px}
.quick-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-top:30px}
.quick-stat{padding:20px;border-radius:10px;background:#fff;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.quick-stat-value{font-size:28px;font-weight:700;color:#B794F6}
.quick-stat-label{font-size:12px;color:#718096;margin-top:5px}
.sub-tab-nav{display:flex;gap:0;margin-bottom:20px;background:#F3E8FF;border-radius:10px;padding:4px}
.sub-tab-btn{padding:10px 24px;border:none;background:transparent;cursor:pointer;font-size:14px;border-radius:8px;color:#718096;transition:all .3s;font-weight:500}
.sub-tab-btn:hover{color:#553C7B}
.sub-tab-btn.active{background:#fff;color:#B794F6;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.sub-tab-content{display:none}
.sub-tab-content.active{display:block}
.data-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px}
.stat-card{padding:20px;border-radius:10px;background:#FAF5FF;text-align:center}
.stat-card .stat-icon{font-size:28px;margin-bottom:8px}
.stat-card .stat-value{font-size:24px;font-weight:700;color:#B794F6}
.stat-card .stat-label{font-size:12px;color:#718096;margin-top:4px}
.stat-card.storage-warn .stat-value{color:#ED8936}
.stat-card.storage-danger .stat-value{color:#E53E3E}
.home-trend-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.home-trend-bar{width:100%;border-radius:6px 6px 0 0;transition:height .3s;min-height:4px}
.home-trend-pct{font-size:11px;font-weight:600;color:#718096}
.home-trend-day{font-size:11px;color:#A0AEC0}
.home-event-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:6px;font-size:13px;cursor:pointer;transition:background .2s}
.home-event-item:hover{filter:brightness(.95)}
.home-event-time{font-size:12px;color:#718096;min-width:50px}
.home-project-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:6px;font-size:13px;cursor:pointer;transition:background .2s}
.home-project-item:hover{filter:brightness(.95)}
.backup-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
